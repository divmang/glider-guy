<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#040c14" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Glider Guy" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- iOS splash screens (portrait) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- SEO & sharing -->
    <title>Glider Guy — Salt Wolf Games</title>
    <meta name="description" content="Tap the air guns to keep your glider flying through the gaps! A fast-paced mobile game by Salt Wolf Games." />
    <meta name="keywords" content="glider game, mobile game, flappy bird, air gun, Salt Wolf Games" />
    <meta property="og:title" content="Glider Guy" />
    <meta property="og:description" content="Tap the air guns to keep your glider flying through the gaps!" />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- AdSense -->
    <meta name="google-adsense-account" content="ca-pub-5015379766355417">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5015379766355417" crossorigin="anonymous"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        width: 100%; height: 100%;
        background: #040c14;
        overscroll-behavior: none;
      }
      body { overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(r => console.log('SW registered'))
            .catch(e => console.log('SW failed', e));
        });
      }
    </script>
  </body>
</html>
